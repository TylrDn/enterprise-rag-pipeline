# RAG pipeline configuration
# All tunable parameters without touching Python code

ingestion:
  pdf:
    chunk_size: 512
    chunk_overlap: 64
  sql:
    rows_per_chunk: 50
  web:
    max_depth: 1
    chunk_size: 512
  slack:
    chunk_size: 512
    chunk_overlap: 64

embedding:
  model: nvidia/nv-embedqa-e5-v5
  batch_size: 64

retrieval:
  top_k: 5
  bm25_weight: 0.4
  dense_weight: 0.6
  rerank_model: cross-encoder/ms-marco-MiniLM-L-6-v2
  rerank_top_n: 5

generation:
  model: meta/llama-3.1-70b-instruct
  temperature: 0.0
  max_tokens: 1024
  stream: false

eval:
  ragas_metrics: [faithfulness, answer_relevancy, context_recall, context_precision]
  langsmith_dataset: rag-pipeline-eval
