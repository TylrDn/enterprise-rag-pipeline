name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    env:
      # Dummy credentials so module-level clients construct without network.
      # Unit tests mock all external I/O; no real secrets are required.
      NVIDIA_API_KEY: ci-dummy-key
      NIM_BASE_URL: https://integrate.api.nvidia.com/v1
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy api backends core embeddings ingestion orchestrator pipeline retriever vectorstore

      - name: Test (pytest)
        run: pytest tests/ -m "not integration" -v --cov --cov-report=term-missing --cov-fail-under=80
