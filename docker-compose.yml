version: "3.9"
services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: rag-pgvector
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=raguser
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ragpassword}
      - POSTGRES_DB=ragdb
    volumes:
      - pgvector-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U raguser -d ragdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: rag-milvus
    ports:
      - "19530:19530"
      - "9091:9091"
    environment:
      - ETCD_ENDPOINTS=etcd:2379
      - MINIO_ADDRESS=minio:9000
    depends_on:
      - etcd
      - minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      timeout: 10s
      retries: 5

  etcd:
    image: quay.io/coreos/etcd:v3.5.5
    container_name: rag-etcd
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
    volumes:
      - etcd-data:/etcd
    command: etcd --advertise-client-urls=http://127.0.0.1:2379 --listen-client-urls http://0.0.0.0:2379 --data-dir /etcd

  minio:
    image: minio/minio:RELEASE.2023-03-13T19-46-17Z
    container_name: rag-minio
    environment:
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio-data:/data
    command: minio server /data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s

  pipeline:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    container_name: rag-pipeline
    env_file:
      - path: .env
        required: false
    ports:
      - "8000:8000"
    environment:
      - VECTORSTORE_BACKEND=${VECTORSTORE_BACKEND:-pgvector}
      - NIM_BASE_URL=${NIM_BASE_URL:-https://integrate.api.nvidia.com/v1}
      - PGVECTOR_URL=postgresql+psycopg://raguser:${POSTGRES_PASSWORD:-ragpassword}@pgvector:5432/ragdb
      - PGVECTOR_COLLECTION=${PGVECTOR_COLLECTION:-rag_docs}
      - MILVUS_URI=http://milvus:19530
    depends_on:
      pgvector:
        condition: service_healthy
    volumes:
      - .:/app
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s

volumes:
  pgvector-data:
  etcd-data:
  minio-data:
  milvus-data:
