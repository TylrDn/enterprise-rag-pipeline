version: "3.9"

services:
  rag-api:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: enterprise-rag-pipeline:latest
    container_name: rag-api
    ports:
      - "8081:8081"
    environment:
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - NIM_BASE_URL=${NIM_BASE_URL:-https://integrate.api.nvidia.com/v1}
      - VECTOR_BACKEND=${VECTOR_BACKEND:-pgvector}
      - PGVECTOR_CONNECTION=postgresql+psycopg://rag:rag@postgres:5432/ragdb
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    container_name: postgres-rag
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: ragdb
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d ragdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  milvus:
    image: milvusdb/milvus:v2.4.0
    container_name: milvus-rag
    ports:
      - "19530:19530"
    environment:
      - ETCD_USE_EMBED=true
      - COMMON_STORAGETYPE=local
    profiles: ["milvus"]

volumes:
  pgdata:
