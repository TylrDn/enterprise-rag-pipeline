apiVersion: v1
kind: Service
metadata:
  name: {{ include "enterprise-rag-pipeline.fullname" . }}-svc
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ include "enterprise-rag-pipeline.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "enterprise-rag-pipeline.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
