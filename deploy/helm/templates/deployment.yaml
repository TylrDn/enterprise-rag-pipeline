apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "enterprise-rag-pipeline.fullname" . }}
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: {{ include "enterprise-rag-pipeline.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "enterprise-rag-pipeline.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "enterprise-rag-pipeline.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
        - name: rag-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          env:
            - name: VECTORSTORE_BACKEND
              value: {{ .Values.env.vectorstoreBackend | quote }}
            - name: NIM_BASE_URL
              value: {{ .Values.env.nimBaseUrl | quote }}
            - name: PGVECTOR_URL
              value: {{ .Values.env.pgvectorUrl | quote }}
            - name: PGVECTOR_COLLECTION
              value: {{ .Values.env.pgvectorCollection | quote }}
          envFrom:
            - secretRef:
                name: {{ .Values.secrets.name }}
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.path }}
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.livenessProbe.periodSeconds }}
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.path }}
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.readinessProbe.periodSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
